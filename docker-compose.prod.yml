version: '3.8'

services:
  # FastAPI приложение
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task_flow_app
    ports:
      - "8000:8000"
    environment:
      # База данных (используем имя сервиса 'db' как хост)
      DATABASE_URL: postgresql://task_user:task_pass@db:5432/task_flow
      # Безопасность - ВАЖНО: переопределите SECRET_KEY в продакшене!
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_this_in_production_12345}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      # Путь к ML модели (если будет)
      ML_MODEL_PATH: /app/models/ml_models.pkl
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m uvicorn main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    volumes:
      # Если нужно сохранять ML модели или загруженные файлы
      - ml_models:/app/models
    networks:
      - task_flow_network

  # PostgreSQL база данных
  db:
    image: postgres:15
    container_name: task_flow_db
    environment:
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: task_pass
      POSTGRES_DB: task_flow
    ports:
      - "5432:5432"  # Комментарий: уберите эту строку в реальном продакшене!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_user -d task_flow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - task_flow_network

  # PgAdmin для управления БД (только для разработки/отладки)
  pgadmin:
    image: dpage/pgadmin4
    container_name: task_flow_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taskflow.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - dev  # Запускается только с --profile dev
    networks:
      - task_flow_network

networks:
  task_flow_network:
    driver: bridge

volumes:
  postgres_data:
  ml_models: